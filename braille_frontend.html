<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Braille Reader</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F7F3EB;
      --cream-dark: #EDE7D9;
      --cream-border: #D8CEB8;
      --green: #3B6D11;
      --green-mid: #639922;
      --green-light: #EAF3DE;
      --green-pale: #F2F8E9;
      --text-dark: #27500A;
      --text-mid: #4a5241;
      --text-muted: #8a9480;
      --dot: #C6D6A8;
    }

    html, body {
      min-height: 100vh;
      background-color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      color: var(--text-dark);
    }

    /* subtle dot grid background */
    body {
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .wrapper {
      max-width: 820px;
      margin: 0 auto;
      padding: 64px 24px 80px;
    }

    header {
      margin-bottom: 56px;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--green-mid);
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 5vw, 52px);
      font-weight: 400;
      line-height: 1.1;
      color: var(--text-dark);
      letter-spacing: -0.02em;
    }

    h1 span {
      color: var(--green-mid);
    }

    .subtitle {
      margin-top: 12px;
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 300;
      max-width: 400px;
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 620px) {
      .layout { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--cream-dark);
      border: 1px solid var(--cream-border);
      border-radius: 16px;
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--cream-border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green-mid);
      flex-shrink: 0;
    }

    .panel-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-mid);
    }

    .panel-body {
      padding: 20px;
    }

    /* Upload zone */
    .upload-zone {
      border: 1.5px dashed var(--cream-border);
      border-radius: 10px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: transparent;
      position: relative;
    }

    .upload-zone:hover {
      border-color: var(--green-mid);
      background: var(--green-pale);
    }

    .upload-zone.dragover {
      border-color: var(--green);
      background: var(--green-light);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      width: 40px;
      height: 40px;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .upload-icon svg {
      width: 40px;
      height: 40px;
      stroke: var(--green-mid);
      fill: none;
      stroke-width: 1.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .upload-text {
      font-size: 14px;
      color: var(--text-mid);
      font-weight: 400;
      line-height: 1.5;
    }

    .upload-text strong {
      color: var(--green);
      font-weight: 500;
    }

    .upload-hint {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* Preview */
    #preview-wrap {
      display: none;
      margin-top: 16px;
    }

    #preview-wrap img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--cream-border);
      object-fit: cover;
      max-height: 200px;
    }

    .file-name {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Controls */
    .controls {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-direction: column;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .field label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      min-width: 64px;
    }

    .field input[type="number"] {
      width: 72px;
      padding: 6px 10px;
      border: 1px solid var(--cream-border);
      border-radius: 6px;
      background: var(--cream);
      color: var(--text-dark);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input[type="number"]:focus {
      border-color: var(--green-mid);
    }

    .run-btn {
      margin-top: 6px;
      width: 100%;
      padding: 12px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.1s;
    }

    .run-btn:hover { background: var(--text-dark); }
    .run-btn:active { transform: scale(0.98); }
    .run-btn:disabled { background: var(--text-muted); cursor: not-allowed; }

    /* Output panel */
    .output-panel {
      min-height: 380px;
      display: flex;
      flex-direction: column;
    }

    .output-panel .panel-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Processed image */
    #processed-img-wrap {
      display: none;
    }

    #processed-img-wrap img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--cream-border);
      object-fit: cover;
      max-height: 180px;
    }

    /* Text output */
    .text-box {
      flex: 1;
      min-height: 160px;
      background: var(--cream);
      border: 1px solid var(--cream-border);
      border-radius: 10px;
      padding: 16px;
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      line-height: 1.8;
      color: var(--text-dark);
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
    }

    .text-box.empty::after {
      content: 'Translated text will appear here…';
      position: absolute;
      inset: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-muted);
      font-style: italic;
      font-weight: 300;
    }

    /* Copy button */
    .copy-row {
      display: flex;
      justify-content: flex-end;
    }

    .copy-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green-mid);
      background: transparent;
      border: 1px solid var(--cream-border);
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .copy-btn:hover {
      background: var(--green-light);
      border-color: var(--green-mid);
    }

    /* Status / loader */
    #status {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 6px 0;
      display: none;
    }

    #status.active { display: block; }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 1.5px solid var(--cream-border);
      border-top-color: var(--green-mid);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Detected dots count */
    #meta {
      display: none;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid var(--cream-border);
      padding-top: 12px;
      display: none;
      gap: 16px;
    }

    #meta.visible { display: flex; }

    .meta-item span { color: var(--green-mid); font-weight: 400; }

    /* Braille cell legend */
    .legend {
      margin-top: 40px;
      padding: 20px 24px;
      background: var(--green-pale);
      border: 1px solid #C6D6A8;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .legend-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .braille-cell {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }

    .dot-cell {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--cream-border);
    }

    .dot-cell.on { background: var(--green); }

    .legend-text {
      font-size: 13px;
      color: var(--text-mid);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <p class="eyebrow">Computer Vision · OCR</p>
      <h1>Braille <span>Reader</span></h1>
      <p class="subtitle">Upload a photograph of braille text to extract and translate the content.</p>
    </header>

    <div class="layout">

      <!-- Input panel -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-dot"></div>
          <span class="panel-label">Input Image</span>
        </div>
        <div class="panel-body">
          <div class="upload-zone" id="upload-zone">
            <input type="file" id="file-input" accept="image/*" />
            <div class="upload-icon">
              <svg viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </div>
            <p class="upload-text"><strong>Choose a file</strong> or drag & drop</p>
            <p class="upload-hint">JPG · PNG · WEBP</p>
          </div>

          <div id="preview-wrap">
            <img id="preview-img" src="" alt="Preview" />
            <p class="file-name" id="file-name"></p>
          </div>

          <div class="controls">
            <div class="field">
              <label>Width</label>
              <input type="number" id="width-input" value="1500" min="500" max="4000" step="100" />
              <span style="font-size:12px;color:var(--text-muted)">px</span>
            </div>
            <div class="field">
              <label>Iter</label>
              <input type="number" id="iter-input" value="0" min="0" max="5" step="1" />
            </div>
            <button class="run-btn" id="run-btn" disabled>Run Translation</button>
          </div>
        </div>
      </div>

      <!-- Output panel -->
      <div class="panel output-panel">
        <div class="panel-header">
          <div class="panel-dot"></div>
          <span class="panel-label">Translation</span>
        </div>
        <div class="panel-body">
          <div id="processed-img-wrap">
            <img id="processed-img" src="" alt="Processed" />
          </div>

          <div class="text-box empty" id="text-output"></div>

          <div id="status"><span class="spinner"></span>Processing image…</div>

          <div id="meta">
            <div class="meta-item">Dots detected: <span id="meta-dots">—</span></div>
            <div class="meta-item">Characters: <span id="meta-chars">—</span></div>
          </div>

          <div class="copy-row">
            <button class="copy-btn" id="copy-btn">Copy text</button>
          </div>
        </div>
      </div>

    </div>

    <!-- Mini legend -->
    <div class="legend">
      <span class="legend-label">Braille cell</span>
      <div style="display:flex;gap:12px;align-items:center">
        <div class="braille-cell">
          <div class="dot-cell on"></div><div class="dot-cell"></div>
          <div class="dot-cell on"></div><div class="dot-cell"></div>
          <div class="dot-cell"></div><div class="dot-cell"></div>
        </div>
        <span style="font-family:'Playfair Display',serif;font-size:18px;color:var(--green)">b</span>
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        <div class="braille-cell">
          <div class="dot-cell on"></div><div class="dot-cell"></div>
          <div class="dot-cell on"></div><div class="dot-cell on"></div>
          <div class="dot-cell"></div><div class="dot-cell on"></div>
        </div>
        <span style="font-family:'Playfair Display',serif;font-size:18px;color:var(--green)">v</span>
      </div>
      <p class="legend-text" style="margin-left:auto">6-dot cells arranged in 2 columns × 3 rows</p>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const uploadZone = document.getElementById('upload-zone');
    const previewWrap = document.getElementById('preview-wrap');
    const previewImg = document.getElementById('preview-img');
    const fileNameEl = document.getElementById('file-name');
    const runBtn = document.getElementById('run-btn');
    const textOutput = document.getElementById('text-output');
    const status = document.getElementById('status');
    const copyBtn = document.getElementById('copy-btn');
    const processedImgWrap = document.getElementById('processed-img-wrap');
    const processedImg = document.getElementById('processed-img');
    const metaEl = document.getElementById('meta');
    const metaDots = document.getElementById('meta-dots');
    const metaChars = document.getElementById('meta-chars');

    let selectedFile = null;

    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      handleFile(file);
    });

    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) handleFile(file);
    });

    function handleFile(file) {
      selectedFile = file;
      const url = URL.createObjectURL(file);
      previewImg.src = url;
      fileNameEl.textContent = file.name;
      previewWrap.style.display = 'block';
      runBtn.disabled = false;
    }

    runBtn.addEventListener('click', runTranslation);

    async function runTranslation() {
      if (!selectedFile) return;

      runBtn.disabled = true;
      status.classList.add('active');
      textOutput.textContent = '';
      textOutput.classList.add('empty');
      processedImgWrap.style.display = 'none';
      metaEl.classList.remove('visible');

      /*
       * INTEGRATION POINT
       * ─────────────────
       * Replace the block below with your actual Python call.
       * Options:
       *   1. FastAPI / Flask endpoint  → fetch('/api/translate', { method:'POST', body: formData })
       *   2. Pyodide (braille.py in-browser)
       *   3. Any backend you prefer
       *
       * Expected response JSON:
       * {
       *   text: "hello world",
       *   dot_count: 84,
       *   processed_image_url: "data:image/png;base64,..."  // optional
       * }
       */

      const formData = new FormData();
      formData.append('image', selectedFile);
      formData.append('width', document.getElementById('width-input').value);
      formData.append('iter', document.getElementById('iter-input').value);

      const response = await fetch('/api/translate', { method: 'POST', body: formData });
      const mockResult = await response.json();

      if (mockResult.error) {
        status.classList.remove('active');
        runBtn.disabled = false;
        textOutput.textContent = 'Error: ' + mockResult.error;
        textOutput.classList.remove('empty');
        return;
      }

      status.classList.remove('active');
      runBtn.disabled = false;

      if (mockResult.text) {
        textOutput.textContent = mockResult.text;
        textOutput.classList.remove('empty');
      }

      if (mockResult.processed_image) {
        processedImg.src = mockResult.processed_image;
        processedImgWrap.style.display = 'block';
      }

      if (mockResult.dot_count !== undefined) {
        metaDots.textContent = mockResult.dot_count;
        metaChars.textContent = mockResult.text.replace(/\s/g, '').length;
        metaEl.classList.add('visible');
      }
    }

    copyBtn.addEventListener('click', () => {
      const t = textOutput.textContent;
      if (!t) return;
      navigator.clipboard.writeText(t).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = 'Copy text'; }, 1800);
      });
    });
  </script>
</body>
</html>
